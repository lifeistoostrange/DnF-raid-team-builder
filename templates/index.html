<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공격대 구성기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { font-size: 28px; margin-bottom: 30px; color: #e94560; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 16px;
            outline: none;
            border: 1px solid #0f3460;
        }
        button {
            padding: 12px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #c73652; }
        #result { width: 100%; max-width: 800px; }
        .character {
            background: #16213e;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #e94560;
        }
        .character.buffer { border-left-color: #4ecca3; }
        .char-info { display: flex; flex-direction: column; gap: 4px; }
        .char-name { font-size: 18px; font-weight: bold; }
        .char-job { font-size: 13px; color: #aaa; }
        .char-adven { font-size: 12px; color: #888; }
        .char-stats { text-align: right; }
        .stat-main { font-size: 16px; font-weight: bold; color: #e94560; }
        .buffer .stat-main { color: #4ecca3; }
        .stat-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
        .error { color: #e94560; font-size: 16px; margin-top: 20px; }
        .loading { color: #aaa; margin-top: 20px; }
        .count { margin-bottom: 16px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <h1>⚔ 공격대 구성기</h1>

    <div class="search-box">
        <input type="text" id="advenInput" placeholder="모험단명을 입력하세요" />
        <button onclick="search()">검색</button>
    </div>

    <div id="result"></div>

    <script>
        document.getElementById("advenInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") search();
        });

        async function search() {
            const adven = document.getElementById("advenInput").value.trim();
            if (!adven) return;

            const result = document.getElementById("result");
            result.innerHTML = '<p class="loading">불러오는 중...</p>';

            const res = await fetch("/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ adven_name: adven })
            });

            const data = await res.json();

            if (data.error) {
                result.innerHTML = `<p class="error">${data.error}</p>`;
                return;
            }

            const chars = data.characters;
            result.innerHTML = `<p class="count">${chars.length}개의 캐릭터를 찾았습니다. (DB 저장 완료)</p>`;

            chars.forEach(c => {
                const isBuffer = !!c.buffScore;
                const statLabel = isBuffer ? "버프력" : "딜";
                const statValue = isBuffer ? c.buffScore : (c.ozma || "정보없음");

                result.innerHTML += `
                    <div class="character ${isBuffer ? 'buffer' : ''}">
                        <div class="char-info">
                            <span class="char-adven">${c.adventrueName}</span>
                            <span class="char-name">${c.name}</span>
                            <span class="char-job">${c.job}</span>
                        </div>
                        <div class="char-stats">
                            <div class="stat-main">${statLabel}: ${statValue}</div>
                            <div class="stat-sub">명성: ${c.fame}</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
