<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공격대 구성기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { font-size: 28px; margin-bottom: 24px; color: #e94560; }

        /* 탭 */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #0f3460;
            width: 100%;
            max-width: 800px;
        }
        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn:hover { color: #eee; }
        .tab-btn.active { color: #e94560; border-bottom-color: #e94560; font-weight: bold; }
        .tab-content { display: none; width: 100%; max-width: 800px; }
        .tab-content.active { display: block; }

        /* 검색 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 16px;
            outline: none;
            border: 1px solid #0f3460;
        }
        button {
            padding: 12px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #c73652; }

        /* 캐릭터 카드 */
        .character {
            background: #16213e;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #e94560;
            gap: 12px;
        }
        .character.buffer { border-left-color: #4ecca3; }
        .char-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .char-name { font-size: 18px; font-weight: bold; }
        .char-job { font-size: 13px; color: #aaa; }
        .char-adven { font-size: 12px; color: #888; }
        .char-stats { text-align: right; }
        .stat-main { font-size: 16px; font-weight: bold; color: #e94560; }
        .buffer .stat-main { color: #4ecca3; }
        .stat-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
        .error { color: #e94560; font-size: 16px; margin-top: 20px; }
        .loading { color: #aaa; margin-top: 20px; }
        .count { margin-bottom: 16px; color: #aaa; font-size: 14px; }

        /* 저장된 캐릭터 목록 */
        .section-title {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 12px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 8px;
        }
        .adven-group { margin-bottom: 10px; }
        .adven-header {
            background: #0f3460;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .adven-header:hover { background: #1a4a80; }
        .adven-header-name { font-size: 16px; font-weight: bold; }
        .adven-header-count { font-size: 13px; color: #aaa; }
        .adven-arrow { font-size: 12px; color: #aaa; transition: transform 0.2s; }
        .adven-arrow.open { transform: rotate(180deg); }
        .adven-body { display: none; padding: 4px 0 0 0; }
        .adven-body.open { display: block; }
        .char-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }

        /* 설정 탭 */
        .settings-form { display: flex; flex-direction: column; gap: 16px; }
        .setting-row {
            background: #16213e;
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .setting-label { display: flex; flex-direction: column; gap: 4px; }
        .setting-label span { font-size: 16px; font-weight: bold; }
        .setting-label small { font-size: 12px; color: #aaa; }
        .setting-input {
            width: 140px;
            flex-shrink: 0;
            padding: 10px 14px;
            text-align: right;
            font-size: 16px;
        }
        .save-btn { margin-top: 8px; width: 100%; padding: 14px; font-size: 16px; }
        .save-msg { text-align: center; margin-top: 10px; font-size: 14px; color: #4ecca3; min-height: 20px; }

        /* 공격대 편성 탭 */
        .raid-run { margin-bottom: 32px; }
        .raid-run-title { font-size: 18px; font-weight: bold; color: #e94560; margin-bottom: 12px; }
        .parties-row { display: flex; gap: 12px; }
        .party-card {
            flex: 1;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }
        .party-header {
            padding: 8px 14px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }
        .party-R .party-header { background: #c0392b; }
        .party-Y .party-header { background: #b7950b; }
        .party-G .party-header { background: #1e8449; }
        .party-slot {
            padding: 10px 14px;
            border-top: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .slot-name { font-weight: bold; }
        .slot-role { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .role-buffer  { background: #1a5c4a; color: #4ecca3; }
        .role-dealer  { background: #5c1a2a; color: #e94560; }
        .role-업둥   { background: #3a3a3a; color: #aaa; }
        .role-야생   { background: #222; color: #666; }
        .slot-combat  { font-size: 12px; color: #aaa; }
        .slot-adven   { font-size: 11px; color: #888; margin-right: 4px; }
        .party-cut-ok  { font-size: 11px; color: #4ecca3; text-align:center; padding: 6px; }
        .party-cut-fail { font-size: 11px; color: #e94560; text-align:center; padding: 6px; }

        /* 모험단 탭 */
        .adven-row {
            background: #16213e;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .adven-row-name { font-size: 16px; font-weight: bold; flex: 1; }
        .adven-nickname-input {
            width: 180px;
            flex-shrink: 0;
            padding: 8px 12px;
            font-size: 14px;
        }
        .adven-save-btn {
            padding: 8px 16px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .adven-saved-msg { font-size: 12px; color: #4ecca3; width: 40px; text-align: center; flex-shrink: 0; }

        /* 참여 설정 탭 */
        .participation-count { margin-bottom: 16px; color: #aaa; font-size: 14px; }
        .character.inactive {
            opacity: 0.35;
            border-left-color: #555;
        }
        .adven-row.inactive { opacity: 0.35; }
        .toggle-btn {
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-btn.on  { background: #4ecca3; color: #1a1a2e; }
        .toggle-btn.off { background: #444; color: #aaa; }
    </style>
</head>
<body>
    <h1>⚔ 공격대 구성기</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('search')">검색</button>
        <button class="tab-btn" onclick="switchTab('saved')">저장된 캐릭터</button>
        <button class="tab-btn" onclick="switchTab('participation')">참여 설정</button>
        <button class="tab-btn" onclick="switchTab('adventurers')">모험단</button>
        <button class="tab-btn" onclick="switchTab('raid')">공격대 편성</button>
        <button class="tab-btn" onclick="switchTab('settings')">설정</button>
    </div>

    <!-- 검색 탭 -->
    <div id="tab-search" class="tab-content active">
        <div class="search-box">
            <input type="text" id="advenInput" placeholder="모험단명을 입력하세요" />
            <button onclick="search()">검색</button>
        </div>
        <div id="result"></div>
    </div>

    <!-- 저장된 캐릭터 탭 -->
    <div id="tab-saved" class="tab-content">
        <div id="savedList"></div>
    </div>

    <!-- 공격대 편성 탭 -->
    <div id="tab-raid" class="tab-content">
        <div style="display:flex; gap:12px; margin-bottom:20px; align-items:center;">
            <button onclick="buildRaid()" style="flex:1; padding:14px; font-size:16px;">편성하기</button>
            <button id="saveRaidBtn" onclick="saveRaid()" style="flex:1; padding:14px; font-size:16px; background:#4ecca3; display:none;">저장</button>
        </div>
        <div class="save-msg" id="raidSaveMsg"></div>
        <div id="raidResult"></div>
    </div>

    <!-- 모험단 탭 -->
    <div id="tab-adventurers" class="tab-content">
        <div id="adventurerList"></div>
    </div>

    <!-- 참여 설정 탭 -->
    <div id="tab-participation" class="tab-content">
        <div id="participationList"></div>
    </div>

    <!-- 설정 탭 -->
    <div id="tab-settings" class="tab-content">
        <div class="settings-form">
            <div class="setting-row">
                <div class="setting-label">
                    <span>명성컷</span>
                    <small>이 수치 미만 캐릭터는 제외</small>
                </div>
                <input type="number" id="set-min_fame" class="setting-input" />
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <span>딜러컷</span>
                    <small>억 단위 입력 (예: 300 → 300억)</small>
                </div>
                <input type="number" id="set-dealer_cut" class="setting-input" />
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <span>버퍼컷</span>
                    <small>만 단위 입력 (예: 400 → 400만)</small>
                </div>
                <input type="number" id="set-buffer_cut" class="setting-input" />
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <span>파티컷 기준 딜합</span>
                    <small>억 단위 입력 (예: 1500 → 1500억)</small>
                </div>
                <input type="number" id="set-clear_dps" class="setting-input" />
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <span>파티컷 기준 버프력</span>
                    <small>만 단위 입력 (예: 680 → 680만)</small>
                </div>
                <input type="number" id="set-clear_buff" class="setting-input" />
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <span>레이드 횟수</span>
                    <small>주차당 공격대 구성 횟수</small>
                </div>
                <input type="number" id="set-raid_count" class="setting-input" min="1" />
            </div>
            <button class="save-btn" onclick="saveSettings()">저장</button>
            <div class="save-msg" id="save-msg"></div>
        </div>
    </div>

    <script>
        document.getElementById("advenInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") search();
        });

        const TAB_NAMES = ["search", "saved", "participation", "adventurers", "raid", "settings"];

        function switchTab(name) {
            document.querySelectorAll(".tab-btn").forEach((btn, i) => {
                btn.classList.toggle("active", TAB_NAMES[i] === name);
            });
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.getElementById("tab-" + name).classList.add("active");

            if (name === "saved") loadSaved();
            if (name === "participation") loadParticipation();
            if (name === "adventurers") loadAdventurers();
            if (name === "settings") loadSettings();
        }

        async function loadSettings() {
            const res = await fetch("/settings");
            const data = await res.json();
            for (const [key, val] of Object.entries(data)) {
                const el = document.getElementById("set-" + key);
                if (el) el.value = val;
            }
        }

        async function saveSettings() {
            const keys = ["min_fame", "dealer_cut", "buffer_cut", "clear_dps", "clear_buff", "raid_count"];
            const data = {};
            for (const key of keys) {
                data[key] = parseFloat(document.getElementById("set-" + key).value);
            }
            await fetch("/settings", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const msg = document.getElementById("save-msg");
            msg.textContent = "저장됐습니다.";
            setTimeout(() => msg.textContent = "", 2000);
        }

        let currentRaids = null;

        async function buildRaid() {
            const container = document.getElementById('raidResult');
            container.innerHTML = '<p class="loading">편성 중...</p>';
            document.getElementById('saveRaidBtn').style.display = 'none';

            const res = await fetch('/build_raid');
            const data = await res.json();

            if (data.error) {
                container.innerHTML = `<p class="error">${data.error}</p>`;
                return;
            }

            currentRaids = data;
            container.innerHTML = renderRaids(data);
            document.getElementById('saveRaidBtn').style.display = '';
        }

        function renderRaids(raids) {
            return raids.map(raid => {
                const partiesHtml = raid.parties.map(party => {
                    const slotsHtml = party.slots.map(s => {
                        const roleClass = `role-${s.role}`;
                        let combat = '';
                        if (s.char_type === 'buffer' && s.combat)
                            combat = `${s.combat}만`;
                        else if (s.char_type === 'dealer' && s.combat)
                            combat = `${s.combat}억`;
                        const adven = s.adven_name ? `<span class="slot-adven">${s.adven_name}</span>` : '';
                        return `
                            <div class="party-slot">
                                ${adven}<span class="slot-name">${s.name}</span>
                                <span class="slot-role ${roleClass}">${s.role}</span>
                                <span class="slot-combat">${combat}</span>
                            </div>`;
                    }).join('');
                    return `
                        <div class="party-card party-${party.label}">
                            <div class="party-header">${party.label}파티</div>
                            ${slotsHtml}
                        </div>`;
                }).join('');
                return `
                    <div class="raid-run">
                        <div class="raid-run-title">${raid.run}회차</div>
                        <div class="parties-row">${partiesHtml}</div>
                    </div>`;
            }).join('');
        }

        async function saveRaid() {
            if (!currentRaids) return;
            const entries = [];
            for (const raid of currentRaids) {
                for (const party of raid.parties) {
                    for (const s of party.slots) {
                        entries.push({
                            run_num:  raid.run,
                            char_key: s.key || null,
                            name:     s.name,
                            job:      s.job || '-',
                            role:     s.role,
                            combat:   s.combat || 0,
                            party:    party.label
                        });
                    }
                }
            }
            await fetch('/roster', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entries)
            });
            const msg = document.getElementById('raidSaveMsg');
            msg.textContent = '저장됐습니다.';
            setTimeout(() => msg.textContent = '', 2000);
        }

        async function loadAdventurers() {
            const container = document.getElementById("adventurerList");
            container.innerHTML = '<p class="loading">불러오는 중...</p>';

            const res = await fetch("/adventurers");
            const list = await res.json();

            if (list.length === 0) {
                container.innerHTML = '<p class="loading">등록된 모험단이 없습니다. 검색 탭에서 모험단을 추가하세요.</p>';
                return;
            }

            let html = `<p class="section-title">모험단 목록 (${list.length}개)</p>`;
            const activeCount = list.filter(a => a.active !== 0).length;
            html = `<p class="participation-count">참여 ${activeCount} / 전체 ${list.length}명</p>` + html;

            list.forEach(a => {
                const isActive = a.active !== 0;
                html += `
                    <div class="adven-row ${isActive ? '' : 'inactive'}" id="arow-${a.adven_name}">
                        <span class="adven-row-name">${a.adven_name}</span>
                        <input class="adven-nickname-input" type="text"
                            placeholder="이름 (직접 입력)"
                            value="${a.nickname || ''}"
                            id="nick-${a.adven_name}" />
                        <button class="adven-save-btn" onclick="saveNickname('${a.adven_name}')">저장</button>
                        <span class="adven-saved-msg" id="nickmsg-${a.adven_name}"></span>
                        <button class="toggle-btn ${isActive ? 'on' : 'off'}"
                            onclick="toggleAdvenActive('${a.adven_name}', this)">
                            ${isActive ? '참여' : '불참'}
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function toggleAdvenActive(advenName, btn) {
            const row = document.getElementById("arow-" + advenName);
            const isCurrentlyActive = btn.classList.contains("on");
            const newActive = !isCurrentlyActive;

            await fetch(`/adventurers/${encodeURIComponent(advenName)}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ active: newActive })
            });

            btn.classList.toggle("on", newActive);
            btn.classList.toggle("off", !newActive);
            btn.textContent = newActive ? "참여" : "불참";
            row.classList.toggle("inactive", !newActive);

            const allRows = document.querySelectorAll("#adventurerList .adven-row");
            const activeCount = document.querySelectorAll("#adventurerList .adven-row:not(.inactive)").length;
            const countEl = document.querySelector("#adventurerList .participation-count");
            if (countEl) countEl.textContent = `참여 ${activeCount} / 전체 ${allRows.length}명`;
        }

        async function saveNickname(advenName) {
            const nickname = document.getElementById("nick-" + advenName).value.trim();
            await fetch(`/adventurers/${encodeURIComponent(advenName)}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nickname })
            });
            const msg = document.getElementById("nickmsg-" + advenName);
            msg.textContent = "✓";
            setTimeout(() => msg.textContent = "", 1500);
        }

        async function loadParticipation() {
            const container = document.getElementById("participationList");
            container.innerHTML = '<p class="loading">불러오는 중...</p>';

            const res = await fetch("/characters");
            const grouped = await res.json();
            const advenNames = Object.keys(grouped);

            if (advenNames.length === 0) {
                container.innerHTML = '<p class="loading">저장된 캐릭터가 없습니다.</p>';
                return;
            }

            const allChars = advenNames.flatMap(a => grouped[a]);
            const activeCount = allChars.filter(c => c.active !== 0).length;

            let html = `<p class="participation-count">참여 ${activeCount} / 전체 ${allChars.length}명</p>`;

            advenNames.forEach(adven => {
                const chars = grouped[adven];
                html += `
                    <div class="adven-group">
                        <div class="adven-header" onclick="toggleAdven(this)">
                            <span class="adven-header-name">${adven}</span>
                            <span>
                                <span class="adven-header-count">${chars.length}캐릭터</span>
                                <span class="adven-arrow">▼</span>
                            </span>
                        </div>
                        <div class="adven-body">
                `;
                chars.forEach(c => {
                    const isBuffer = !!c.buff_score;
                    const isActive = c.active !== 0;
                    const statLabel = isBuffer ? "버프력" : "딜";
                    const statValue = isBuffer
                        ? c.buff_score + "만"
                        : (c.dundam_dps ? c.dundam_dps + "억" : "정보없음");
                    const imgUrl = c.key && c.server
                        ? `https://img-api.neople.co.kr/df/servers/${c.server}/characters/${c.key}?zoom=1`
                        : '';
                    html += `
                        <div class="character ${isBuffer ? 'buffer' : ''} ${isActive ? '' : 'inactive'}" id="pcard-${c.key}">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${c.name}" class="char-img" onerror="this.style.display='none'">` : ''}
                            <div class="char-info">
                                <span class="char-name">${c.name}</span>
                                <span class="char-job">${c.job}</span>
                            </div>
                            <div class="char-stats">
                                <div class="stat-main">${statLabel}: ${statValue}</div>
                                <div class="stat-sub">명성: ${c.fame ? c.fame.toLocaleString() : '-'}</div>
                            </div>
                            <button class="toggle-btn ${isActive ? 'on' : 'off'}"
                                onclick="toggleActive('${c.key}', this)">
                                ${isActive ? '참여' : '불참'}
                            </button>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        async function toggleActive(key, btn) {
            const card = document.getElementById("pcard-" + key);
            const isCurrentlyActive = btn.classList.contains("on");
            const newActive = !isCurrentlyActive;

            await fetch(`/characters/${key}/active`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ active: newActive })
            });

            btn.classList.toggle("on", newActive);
            btn.classList.toggle("off", !newActive);
            btn.textContent = newActive ? "참여" : "불참";
            card.classList.toggle("inactive", !newActive);

            // 카운트 업데이트
            const allCards = document.querySelectorAll("#participationList .character");
            const activeCount = document.querySelectorAll("#participationList .character:not(.inactive)").length;
            const countEl = document.querySelector("#participationList .participation-count");
            if (countEl) countEl.textContent = `참여 ${activeCount} / 전체 ${allCards.length}명`;
        }

        async function loadSaved() {
            const container = document.getElementById("savedList");
            container.innerHTML = '<p class="loading">불러오는 중...</p>';

            const res = await fetch("/characters");
            const grouped = await res.json();

            const advenNames = Object.keys(grouped);
            if (advenNames.length === 0) {
                container.innerHTML = '<p class="loading">저장된 캐릭터가 없습니다.</p>';
                return;
            }

            let html = `<p class="section-title">저장된 모험단 (${advenNames.length}개)</p>`;

            advenNames.forEach(adven => {
                const chars = grouped[adven];
                html += `
                    <div class="adven-group">
                        <div class="adven-header" onclick="toggleAdven(this)">
                            <span class="adven-header-name">${adven}</span>
                            <span>
                                <span class="adven-header-count">${chars.length}캐릭터</span>
                                <span class="adven-arrow">▼</span>
                            </span>
                        </div>
                        <div class="adven-body">
                `;
                chars.forEach(c => {
                    const isBuffer = !!c.buff_score;
                    const statLabel = isBuffer ? "버프력" : "딜";
                    const statValue = isBuffer
                        ? c.buff_score + "만"
                        : (c.dundam_dps ? c.dundam_dps + "억" : "정보없음");
                    const imgUrl = c.key && c.server
                        ? `https://img-api.neople.co.kr/df/servers/${c.server}/characters/${c.key}?zoom=1`
                        : '';
                    html += `
                        <div class="character ${isBuffer ? 'buffer' : ''}">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${c.name}" class="char-img" onerror="this.style.display='none'">` : ''}
                            <div class="char-info">
                                <span class="char-name">${c.name}</span>
                                <span class="char-job">${c.job}</span>
                            </div>
                            <div class="char-stats">
                                <div class="stat-main">${statLabel}: ${statValue}</div>
                                <div class="stat-sub">명성: ${c.fame ? c.fame.toLocaleString() : '-'}</div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        function toggleAdven(header) {
            const body = header.nextElementSibling;
            const arrow = header.querySelector(".adven-arrow");
            body.classList.toggle("open");
            arrow.classList.toggle("open");
        }

        async function search() {
            const adven = document.getElementById("advenInput").value.trim();
            if (!adven) return;

            const result = document.getElementById("result");
            result.innerHTML = '<p class="loading">불러오는 중...</p>';

            const res = await fetch("/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ adven_name: adven })
            });

            const data = await res.json();

            if (data.error) {
                result.innerHTML = `<p class="error">${data.error}</p>`;
                return;
            }

            const chars = data.characters;
            result.innerHTML = `<p class="count">${chars.length}개의 캐릭터를 찾았습니다. (DB 저장 완료)</p>`;

            chars.forEach(c => {
                const isBuffer = !!c.buffScore;
                const statLabel = isBuffer ? "버프력" : "딜";
                const statValue = isBuffer ? c.buffScore : (c.ozma || "정보없음");

                result.innerHTML += `
                    <div class="character ${isBuffer ? 'buffer' : ''}">
                        <div class="char-info">
                            <span class="char-adven">${c.adventrueName}</span>
                            <span class="char-name">${c.name}</span>
                            <span class="char-job">${c.job}</span>
                        </div>
                        <div class="char-stats">
                            <div class="stat-main">${statLabel}: ${statValue}</div>
                            <div class="stat-sub">명성: ${c.fame}</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
